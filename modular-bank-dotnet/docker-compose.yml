version: '3.8'

services:
  # Databases
  postgres-monolith:
    image: postgres:16
    environment:
      POSTGRES_DB: modular_bank_dotnet
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank
    ports:
      - "5433:5432"
    volumes:
      - postgres_monolith_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-accounts:
    image: postgres:16
    environment:
      POSTGRES_DB: finbank_accounts
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank
    ports:
      - "5434:5432"
    volumes:
      - postgres_accounts_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-transfers:
    image: postgres:16
    environment:
      POSTGRES_DB: finbank_transfers
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank
    ports:
      - "5435:5432"
    volumes:
      - postgres_transfers_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Message Broker
  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"      # AMQP port
      - "15672:15672"    # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Observability Stack
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "4317:4317"      # OTLP receiver (gRPC)
      - "4318:4318"      # OTLP receiver (HTTP)
      - "16686:16686"    # Jaeger UI
    volumes:
      - jaeger_data:/badger/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yml:/etc/loki/local-config.yml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - jaeger
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Microservices
  accounts-service:
    build:
      context: .
      dockerfile: services/accounts-service/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=postgres-accounts;Port=5432;Database=finbank_accounts;Username=bank;Password=bank"
      Jwt__Secret: "accounts-service-prod-secret-change-min-32-chars!!!!!"
      OpenTelemetry__ExporterEndpoint: "http://localhost:4317"
    ports:
      - "5001:8080"
    depends_on:
      postgres-accounts:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  transfers-service:
    build:
      context: .
      dockerfile: services/transfers-service/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=postgres-transfers;Port=5432;Database=finbank_transfers;Username=bank;Password=bank"
      Jwt__Secret: "transfers-service-prod-secret-change-min-32-chars!!!!!"
      AccountsService__Url: "http://accounts-service:8080"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: "guest"
      RabbitMQ__Password: "guest"
      OpenTelemetry__ExporterEndpoint: "http://localhost:4317"
    ports:
      - "5002:8080"
    depends_on:
      postgres-transfers:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      accounts-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      OpenTelemetry__ExporterEndpoint: "http://localhost:4317"
    ports:
      - "5000:8080"
    depends_on:
      - accounts-service
      - transfers-service
      - monolith
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Monolith (residual: Auth + Notifications + Audit consumers)
  monolith:
    build:
      context: .
      dockerfile: src/ModularBank/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=postgres-monolith;Port=5432;Database=modular_bank_dotnet;Username=bank;Password=bank"
      Jwt__Secret: "modular-bank-prod-secret-change-min-32-chars!!!!!"
      Features__UseAccountsMS: "true"
      AccountsService__Url: "http://accounts-service:8080"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      RabbitMQ__Username: "guest"
      RabbitMQ__Password: "guest"
      OpenTelemetry__ExporterEndpoint: "http://localhost:4317"
    ports:
      - "5010:8080"
    depends_on:
      postgres-monolith:
        condition: service_healthy
      accounts-service:
        condition: service_healthy
      transfers-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_monolith_data:
  postgres_accounts_data:
  postgres_transfers_data:
  rabbitmq_data:
  jaeger_data:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  default:
    name: finbank-network
